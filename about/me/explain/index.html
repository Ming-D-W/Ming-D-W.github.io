DfwoWs/rfv93NWN/ZfvwsLIU7A09gxECyISeGJkHAau98L97tuw7NXnoPyNF8FcYGLGKsOs0mN3OEyec9esGW/ZEl945dTP34wlR2FZVQWU1q0Cw8Tr7p+hgLLNL0FPxx/Q35mA8aEUrH6nCgwEl0tn7wUiZYJnNRh6DK4UH/k0lfyrsBKdPVv/AriGIQcEDQZ65LBAGe2Rzui9Ybjz7XUppz1/uKBbyVPGkN3ZAeC6hr0x7Nr38N5+EqkoOm17xpoqR9ohQF55ERSvr4Dkr3chNfC3DMzGJlNBElW8w9nsGQvhNGIzDkXzCg8cLK951xHsFBlTJspJNi3ZFIMF2AeDV3q8DNOB+YHi6QTrChDIWDBRi5U5f+ZMfJLu3ccrqxtdxk4SKH336LFxSmkqefwU5T8fhdSdQf9IVKD6aNiwI/hnmcAZ91isYMJIaCUCx9W098+LgruikeTqzqqxKPUwqJyCPJiyemVVZBOijDGjD38Os0jOiSPL1z3SPjXNANbiNPXAdzTfukjjuknNBbyz3nwgTd3AVFqUJ5hpHlq9MveLnWwttUfoygBmvVjuikxND3znrhsELnZk7k+OjIGxeNEkomyLVta0xxn+HZhjBc4YZ/AFjHjz9u3xRZl2BN4aq9nFwWh16IrQ1aHHEd3j1+4/dB9OtH4e29A2H1DyHQRmOSfQZ1Fy7MHBTGB6J/Djq6p3OxyO2cB+4Car7v/o3GXgfAkj23+x9ID1Teoamo/SXcbvSf2PX7Vc8DdCmE1vN9di+32P9/5YR3vLnhCVGUWBjEkr3yh4H8v9CzmsbdhzOKzsJKM90iFdaTMjRPhGVsakRvOaRidljo6H6G7j+ctrJpsP+4COhDIl0La2+FS4+5mlocBaXY5QnGZysIBYoeSsl5qQzrSj/cgNrfuEzlWBfwA+EjrZyWUvpAAAAABJRU5ErkJggg==">自我 - 说明<span class="title-tag">原创</span></h1> <!----> <div class="theme-vdoing-content content__default"><div class="custom-block note"><p class="custom-block-title">序言</p> <p>书写自己，亦是内省自己，重塑根基。</p> <div class="custom-block right"><p>2021-11-03 @Du Wu</p></div></div> <h2 id="关于我"><a href="#关于我" class="header-anchor">#</a> 关于我</h2> <p>我目前是一名大四学生，快毕业了，才有心思搭建博客，欲记录下生活的痕迹。这是我的第一个博客网站，非常值得留下回忆，抒写过去。我会不断把自己的笔记搬到这个网站，也会将生活的点滴留住这里。之前的笔记都放在有道云笔记中，比较零碎，所以需要花时间整理好笔记的结构和排版——重构笔记，也是在重塑知识的根基。</p> <p>初中时是一名书呆子，模糊印象中的自己，常徘徊于教室和宿舍，沉浸于书香和碎语。初中后段迷上了小说，看的第一本小说是斗破苍穹，当初和一位朋友省下生活费周末跑去书店买书籍，实在怀念。我白纸般的性格，受到这些小说的影响巨深，感谢那些作者，刻画的人物充满正义和坚持。我也喜欢阅读文学，那段时期和另一位朋友畅聊心绪，夜里并行，享尽沉沦。尝试写过诗词，为朋友、为家乡、为亲人、为回忆留下大片的时光笔记，情绪尽扬洒在字里行间。值得感触的是——夜晚飘扬的因子是思绪散发的最好媒介。</p> <p>高中时开始认真锻炼，从打篮球到跑步，从球场到绿茵场，也从害羞到张扬。虽然实力不怎么样，但是喜欢大汗淋漓的感觉，病态的肆虐身体。小说依然会看，只不过从实体书到了电子书。在时间的冲刷下，我走过了很多不寻常的路，接触了许多电子产品，从揣怀的手机到沉潜的 MP3；从教室的挂钟到左手的银表；从黄金书屋到虚拟世界，让小说、文学、游戏、歌曲慢慢洗涤着自己，留下一地的时间琐屑。此外，我捧起梦想，开始写起了小说，尝试在网站发布小说，却没有坚持下来，而小说体系已经确定下来，非常遗憾。我的第一个实际梦想是当一名作家，我在此路途上记录起了很多风景：有宿舍的大家、有同桌的他们、有故里的家乡、也有眼眸里唯一的她——扬起槟榔树，洒下水珠，坠入行人的发隙，惹出呼声。却唯独没有写过自己——我只是个过客，路过这个世界的旅客。</p> <p>大学时更加肆意，刚来时满怀期待和热血，第一天当起了志愿者，好奇带有忐忑的同时与学长学姐了解大学的生活。揣怀的对大学的憧憬，我走过校园的每一处，参加过学生会、技术基地、篮球队，却敌不过渐弱的热情，我对外界的平淡猛然出现，触不及防。于是我对虚拟的事物兴趣欲浓，我玩起电脑游戏，徘徊于 Steam、Epic 等平台，天生的游戏欲彻底爆发，游戏恍若真实的世界让我对于现实不再留念。当然，受到性格的影响，忧患时常响在脑海，我从现实走进虚拟的途中，学习过 PS、PR、AE 等 Adobe 成员；涉及过 Word、Excel、PPT 等办公软件；研究过电脑桌面的极致美化、主题壁纸的更迭技术，最后折腾了许多版本，得出结论——美化的尽头是默认，而我的大学尽头是篮球——唯一陪我四年的热爱。</p> <p>我开始接触 Java 是在 2019 年 11 月份左右，仅仅接触，捧着书看。因为对未来的忧患意识让我必须拥有一项能立足的技能，经过专业和兴趣的考虑，我接触了 Java。而我真正学习 Java，是在疫情爆发期间，记得那时候，病情席卷世界、难声响遍各地、慌张充斥心灵，突然性的迷茫如同棱锥扎进我的世界，我不得不抓住希望的稻草，而 Java 被我抓到了。学到如今，我依然发现，自己仅仅掌握一点知识的皮毛，尚且连冰山一角都不够说。我渴望拥有拨开深处的能力，所以依然在实现我的道路——朝圣的使徒，正在走向编程的至高殿堂。</p> <h2 id="关于它"><a href="#关于它" class="header-anchor">#</a> 关于它</h2> <p>我已经丧失了追求文笔的勇气，迷失在大片诱惑的迷雾里，再也无法氤氲出感性的灵感。我遗落了它，没有能力拾起。</p> <p>其实我在19年就已经意识到了这个问题。来到大学，相比较高中，犹如脱离静谧的山谷，来到广袤的天地中，但是危险也遍布各地。如懒惰、虚乐。我尝试接触过这些危险，回首时却无法脱身，已然陷入其中而无法自拔。高中的行事规律已被打破，曾经晚自习时的桌子上——白纸黑笔的孓然一身，如今变成了手机里的光影痴迷。夜晚我走在校园的道路上，微风吹过我的发梢，晃动我的心绪，我冷静下来，想起曾经的自己，和现在的自己截然不同。在心中，它已被压在最下面，而上方，不时地不断投放杂物，它已经踹不过气，我无法救自己，更加无法救它。也许生活就是如此，歌颂生活的激扬终将会沉静下来——骊歌响彻心灵，来场告别吧！和它。</p></div></div> <!----> <div class="page-edit"><!----> <div class="tags"><a href="/tags/?tag=%E5%85%B3%E4%BA%8E" title="标签">#关于</a></div> <div class="last-updated"><span class="prefix">更新时间:</span> <span class="time">2023/04/04, 21:10:44</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/about/liang-shi-bo/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">自我 - 温润少年</div></a> <a href="/about/website/introduce/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">本站 - 介绍</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
