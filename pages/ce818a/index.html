v class="articleInfo" data-v-06225672><ul class="breadcrumbs" data-v-06225672><li data-v-06225672><a href="/" title="首页" class="iconfont icon-home router-link-active" data-v-06225672></a></li> <li data-v-06225672><a href="/categories/?category=%E6%9B%B4%E5%A4%9A" title="分类" data-v-06225672>更多</a></li><li data-v-06225672><a href="/categories/?category=%E5%AD%A6%E4%B9%A0" title="分类" data-v-06225672>学习</a></li></ul> <div class="info" data-v-06225672><div title="作者" class="author iconfont icon-touxiang" data-v-06225672><a href="https://github.com/Ming-D-W" target="_blank" title="作者" class="beLink" data-v-06225672>Ming</a></div> <div title="创建时间" class="date iconfont icon-riqi" data-v-06225672><a href="javascript:;" data-v-06225672>2020-05-24</a></div> <!----></div></div></div> <!----> <div class="content-wrapper"><div class="right-menu-wrapper"><div class="right-menu-margin"><div class="right-menu-title">目录</div> <div class="right-menu-content"></div></div></div> <h1><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAB4AAAAeCAYAAAA7MK6iAAAAAXNSR0IArs4c6QAABH1JREFUSA3tVl1oHFUUPmdmd2ltklqbpJDiNnXFmgbFktho7YMPNiJSSZM0+CAYSkUELVhM6YuwIPpgoOKDqOBDC0XE2CQoNtQXBUFTTcCi+Wlh1V2TQExsUzcltd3M9Tt3ZjZzZ2fT+OJTL8yeM+eee757fmeJbq//KQL8X3DUSFOcfr7cRsRtxNQMWueeVzOkaITIGqQHNg5y8+jNW9ldM7A6nTpAjuolUikAwq7CE3WcM2RRDz+XGVgN3FptU/aUSlvq9Pa3iZ1+sgAqJyyAFqkipd9dqiwHF3P65YycLWc/6sqGrvoEoIp6DOFaX5h6+dnfjkWprwqsPk0dUGq5vySwDImC10KxFHgGL1SWoc92O3eVht09qdXNH11I2SsTsJYqMWzihqGMi+A+Garf3BAuuLI5oGlULyNfyB/HYNujwktOfRrMr5t77NmevqaUopx0grnKAyvVpmwUDB4x6FPXuGvYLTDwWsejwgtgkYKPqRJg8SV6xaiZ3ZTppGneS4yfH5/66fZSDHv+QZci/+h5c5UHtpy67JUqGppM0sh0Nc1dW6/N1W5Yoqat8/TU/VnadmdeW2PLLSyh0cvxBs3KbqTmwYPpxN4do/mzE8nEpvX/UMu2Wbp74zUAK5q6WkHns7V0eWkdPbPzd3rxkTGybadYySumVzhcaJFbs5UrEkQ/+CK8gF5dnh/6ciIZ73gwQ927L1IitoxKLXYP3SjYdOrHHfTZhRRlFyrorafPk20B3HPD1y2G3qKZME5Jcf3t/HUC13/8tSd++vqFveMUTwAUxSUFI1QekR1+bIze3D9MF2aq6cPvG72CgnldWCFqyRw3lwH8ZMerjTD9ElRO7Gv44wNpC90aASqGfVlz/Rx17srQ57/UU26hkhQqUB7dBR71WmzQhHUnblGmVOEw0jhbV1n9OlXUDCIRGaNV5Jp43N516fN7JmnTHdfp7Hgy0luO4aMhtkLL8Bi3bUWYvzh5Mn1dTxrL6QmGuRhGL/TiTTxRoEdTszSaq9GR0NGA3KdkOz3hqSV3MIDhQ5IVX/Ivx3umBti2es2h4eZby7x8br1rkf7Mo90AqC8aQ3sJeNzqFRu+vSANAQe3PL7l0HGOAdwDCeZYvNKeoZp1Qfs6Aipndh86HmFRi0LAnEO47wsqM6cdfjh3jBPUzhZy7nvlUfFsamED1VQt6aISHVymXZ/B2aCtIG8AI8xfobj2d3en1wWVhOeHELKmLQ1s211s88comkv4UCwWyF787mJdYXtNfhKAXVqnKTq8QZvGAGGOfaTo5pGZ/PwbUCr5+DPr/1J92JNHr9aOl/F3iI5+O1nfybsGxoimvZ3ViWSluDITw3P37mypheDIPY0tw7+O/5ApbkYw+zpfaUVu32Pi98+defdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">搜索引擎使用技巧<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>搜索引擎相信大家经常在使用，但是有时候想搜某个信息时却搜出来一大堆不相关的（百度：你们都在看我干什么？）。下面我们来介绍几种搜索技巧，可以提升搜索效率，助你快速查资料，妈妈再也不担心我的学习了（'妈~我真的是在找学习资料'）</p> <h3 id="技巧1-排除干扰项"><a href="#技巧1-排除干扰项" class="header-anchor">#</a> 技巧1：排除干扰项</h3> <p><strong>方式</strong>：关键词1+空格+减号+关键词2，即 <code>关键词1 -关键词2</code></p> <p><strong>功能</strong>：排除一些不想要的关键词</p> <p><strong>示例</strong>：</p> <div class="language- line-numbers-mode"><pre class="language-text"><code>锤子 -锤子手机
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>示例中将在搜索结果排除与<code>锤子手机</code>相关的，只显示<code>锤子</code>本来的样子。</p> <blockquote><p>经过百度搜索的测试，有的关键词能排除掉，有的并不好使</p></blockquote> <h3 id="技巧2-精确搜索"><a href="#技巧2-精确搜索" class="header-anchor">#</a> 技巧2：精确搜索</h3> <p><strong>方式</strong>：给关键词加双引号，<code>&quot;关键词&quot;</code></p> <p><strong>功能</strong>：只搜索引号里的字，少一个字或者把字拆开都不行</p> <p><strong>示例</strong>：</p> <div class="language- line-numbers-mode"><pre class="language-text"><code>&quot;达拉不崩吧&quot;
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><blockquote><p>注意是英文的双引号</p></blockquote> <h3 id="技巧3-指定网站内搜索"><a href="#技巧3-指定网站内搜索" class="header-anchor">#</a> 技巧3：指定网站内搜索</h3> <p><strong>方式</strong>：<code>site:域名 关键词</code></p> <p><strong>功能</strong>：只搜索指定域名的内容</p> <p><strong>示例</strong>：</p> <div class="language- line-numbers-mode"><pre class="language-text"><code>site:zhihu.com 前端
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>有一些站内自带的搜索并不好用，可以尝试这个搜索技巧。</p> <h3 id="技巧4-指定文件格式"><a href="#技巧4-指定文件格式" class="header-anchor">#</a> 技巧4：指定文件格式</h3> <p><strong>方式</strong>：<code>filetype:文件格式 关键词</code></p> <p><strong>示例</strong>：</p> <div class="language- line-numbers-mode"><pre class="language-text"><code>filetype:avi 你懂的
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>常见文件格式有<code>doc</code>、<code>pdf</code>、<code>ppt</code>等</p> <h3 id="技巧5-指定在标题搜索"><a href="#技巧5-指定在标题搜索" class="header-anchor">#</a> 技巧5：指定在标题搜索</h3> <p><strong>方式</strong>：<code>intitle:关键词</code></p> <p><strong>功能</strong>：搜索的关键词要出现在标题当中</p> <h3 id="技巧6-指定在内容中搜索"><a href="#技巧6-指定在内容中搜索" class="header-anchor">#</a> 技巧6：指定在内容中搜索</h3> <p><strong>方式</strong>：<code>intext:关键词</code>、<code>allintext:关键词1 关键词2</code>、<code>inurl:关键词2</code></p> <h3 id="技巧7-多种搜索技巧叠加使用"><a href="#技巧7-多种搜索技巧叠加使用" class="header-anchor">#</a> 技巧7：多种搜索技巧叠加使用</h3> <p><strong>示例</strong>：</p> <div class="language- line-numbers-mode"><pre class="language-text"><code>site:zhihu.com 前端 intitle:js
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>多种技巧和关键词叠加使用，中间空格隔开。</p> <h3 id="注意事项"><a href="#注意事项" class="header-anchor">#</a> 注意事项</h3> <p>以上搜索技巧使用的符号均是英文符号。</p></div></div> <!----> <div class="page-edit"><!----> <div class="tags"><a href="/tags/?tag=%E6%90%9C%E7%B4%A2%E6%8A%80%E5%B7%A7" title="标签">#搜索技巧</a></div> <div class="last-updated"><span class="prefix">更新时间:</span> <span class="time">2023/03/30, 17:54:49</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/9ba2b8fb13de1957/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">处理问题的思路</div></a> <a href="/advanced/4b2339/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">JavaScript 的三座大山</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
