-viewport<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> 进行相关配置，就可以帮助我们将 <code>px</code> 自动转化为 <code>vw</code></p> <p><code>ignoring</code> 特性，对不需要转换的属性进行标注</p></li></ul> <h3 id="flex布局"><a href="#flex布局" class="header-anchor">#</a> flex布局</h3> <ul><li><p>flex布局就是弹性布局 我之前在公司里面写小程序，uniapp项目都是用这种布局的</p></li> <li><p>这种布局是把盒子分为两种，父盒子，子盒子</p></li> <li><p>父盒子上的属性</p> <ul><li>display:flex 开启弹性布局</li> <li>flex-direction:设置主轴方向</li> <li>justify-content:设置所有的子元素在主轴上的对齐方式</li> <li>align-items 设置侧轴上所有的子元素的对齐方式</li></ul></li></ul> <h3 id="css3的新属性"><a href="#css3的新属性" class="header-anchor">#</a> css3的新属性</h3> <ul><li><p>transition 过渡 二帧</p></li> <li><p>transform 放大缩小</p></li> <li><p>animation keyframe 帧动画</p></li> <li><p>flex布局</p></li> <li><p>background-size cover,contain</p></li> <li><p>box-shadow 盒子阴影</p></li> <li><p>text-shadow 文字阴影</p></li> <li><p>border-radius 圆角</p></li></ul> <h3 id="你对less-sass的理解-区别是什么"><a href="#你对less-sass的理解-区别是什么" class="header-anchor">#</a> 你对less,sass的理解，区别是什么</h3> <ul><li><p>这二个都是css预处理语言，(我以前项目中二个都在用，移动端用less，PC端后台管理项目用sass )</p></li> <li><p>共同点</p> <ul><li>都有变量 嵌套语法 父选择器&amp; 混入mixin</li></ul></li> <li><p>区别</p> <ul><li>变量：less是@符开头的,sass是以$开头的</li> <li>sass功能要更加强大一些，因为在sass中可以在里面写条件判断和循环的，这一点less是做不到的</li></ul></li></ul> <h3 id="回流-重排-和重绘"><a href="#回流-重排-和重绘" class="header-anchor">#</a> 回流（重排）和重绘</h3> <ul><li><p>我先给您说一下浏览器渲染工作原理</p> <ul><li>首先html会被解析成dom树，css会被解析成css规则树，然后这二个东西会合并出来一个render tree(渲染树)，浏览器就会根据渲染树来进行页面绘制</li></ul></li> <li><p>回流:DOM元素创建、移除还有尺寸(px相关)发生变化的时候，就会导致DOM树重建，渲染树重建</p></li> <li><p>重绘：一般指的颜色相关的,color,background-color这些只会导致渲染树需要重建</p></li> <li><p>回流一定会重绘，但是重绘不一定会回流</p> <p><img src="https://photo-album-1314189846.cos.ap-shanghai.myqcloud.com/202304072028450.png" alt="DOM树渲染"></p></li> <li><p>这块我建议为了引导面试官，可以稍微补充一句话：我们尽量要避免重绘和回流，因为这个会影响页面性能 这个时候面试官会问一个：<strong>如何去避免重绘和回流</strong></p> <ul><li>多个属性尽量使用简写，例如：boder可以代替boder-width、boder-color、boder-style</li> <li>DocumentFragment,先把所有的DOM元素添加到这个东西上，然后再一次性追加到DOM树上</li> <li>避免设置多层内联样式，避免节点层级过多</li> <li>不要一个一个去修改行内样式，而是创建一个类名，把要修改的东西全部写在这个类名里面，然后直接给元素加上这个类名，只会有一次回流和重绘</li> <li>先把这个元素隐藏，然后把样式该加的全部加上，然后最后再显示，只会有一次回流和重绘</li> <li>尽量多使用CSS3新特性，比如transform,可以让页面开启gpu加速，不会导致重绘和回流</li> <li>将频繁重绘或回流的节点设置为图层，图层能够阻止该节点的渲染行为影响到别的节点（例：will-change\video\iframe等标签），浏览器会自动将该节点变为图层</li></ul></li></ul></div></div> <!----> <div class="page-edit"><!----> <div class="tags"><a href="/tags/?tag=CSS" title="标签">#CSS</a><a href="/tags/?tag=%E9%9D%A2%E8%AF%95%E6%80%BB%E7%BB%93" title="标签">#面试总结</a></div> <div class="last-updated"><span class="prefix">更新时间:</span> <span class="time">2023/04/25, 01:33:08</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/d178b0/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">浏览器&amp;http</div></a> <a href="/pages/3d4029/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">new Vue的流程</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
