="breadcrumbs" data-v-06225672><li data-v-06225672><a href="/" title="首页" class="iconfont icon-home router-link-active" data-v-06225672></a></li> <li data-v-06225672><a href="/categories/?category=%E5%B7%A5%E5%85%B7" title="分类" data-v-06225672>工具</a></li><li data-v-06225672><a href="/categories/?category=%E5%BC%80%E5%8F%91%E7%AE%A1%E7%90%86%20-%20Git" title="分类" data-v-06225672>开发管理 - Git</a></li></ul> <div class="info" data-v-06225672><div title="作者" class="author iconfont icon-touxiang" data-v-06225672><a href="https://github.com/Ming-D-W" target="_blank" title="作者" class="beLink" data-v-06225672>Ming</a></div> <div title="创建时间" class="date iconfont icon-riqi" data-v-06225672><a href="javascript:;" data-v-06225672>2021-02-08</a></div> <!----></div></div></div> <!----> <div class="content-wrapper"><div class="right-menu-wrapper"><div class="right-menu-margin"><div class="right-menu-title">目录</div> <div class="right-menu-content"></div></div></div> <h1><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAB4AAAAeCAYAAAA7MK6iAAAAAXNSR0IArs4c6QAABKFJREFUSA3tVl1oFVcQnrMbrak3QUgkya1akpJYcrUtIqW1JvFBE9LiQ5v6JmJpolbMg32rVrhgoYK0QiMY6i9Y6EMaW5D+xFJaTYItIuK2Kr3+BJNwkxBj05sQY3b3nM6cs2dv9t7NT/vQJw/sndk5M/PNzJkzewGerP+pAmy+ON8lLzUJgA8ZYxYIYZmGYRnctDaWvJJAmTtfP1pvXsBCCPP8QFcCaRkZYACgDZFO4stNIcBCajEOlmmC9XpJ9bAGCaPaPmzPl32dvLSVu3BWCTQs0XQQ6g0DYgwLIoAZbBCdW/i+781o1VVlm/410mw4h06Y7bIPHNyWDyL4FHkX03Q8SrzNhZTZriieckWt7cL6MM85YcLpsi/7O9/iXFT6MswI0DmmpkSaJ0qLxFIm3+i1THHB3zmBH3PYx9CcykcLOeQVVa7QtdxTgQgEleX2AjHYfwA+2ddV77ruGoJUbhGDI09YSNXyMpUt5ylOzxgbUmtOp7NmbNt8v3arjTBfYELmLUV+M+nSawNNAUqpT3ClJWg5I3BLT+cGW/DXNGCa6tx1aakCGEigArTn4TDIPdrXXYKCZNrHLMCOEPvHBlLQ99s9eHB7EB6NTki73CVPQ2F5MSx/uRQixfmq7rK0wYD8w8E905bnPDfwoWs/rfv93NWN/ZfvwsLIU7A09gxECyISeGJkHAau98L97tuw7NXnoPyNF8FcYGLGKsOs0mN3OEyec9esGW/ZEl945dTP34wlR2FZVQWU1q0Cw8Tr7p+hgLLNL0FPxx/Q35mA8aEUrH6nCgwEl0tn7wUiZYJnNRh6DK4UH/k0lfyrsBKdPVv/AriGIQcEDQZ65LBAGe2Rzui9Ybjz7XUppz1/uKBbyVPGkN3ZAeC6hr0x7Nr38N5+EqkoOm17xpoqR9ohQF55ERSvr4Dkr3chNfC3DMzGJlNBElW8w9nsGQvhNGIzDkXzCg8cLK951xHsFBlTJspJNi3ZFIMF2AeDV3q8DNOB+YHi6QTrChDIWDBRi5U5f+ZMfJLu3ccrqxtdxk4SKH336LFxSmkqefwU5T8fhdSdQf9IVKD6aNiwI/hnmcAZ91isYMJIaCUCx9W098+LgruikeTqzqqxKPUwqJyCPJiyemVVZBOijDGjD38Os0jOiSPL1z3SPjXNANbiNPXAdzTfukjjuknNBbyz3nwgTd3AVFqUJ5hpHlq9MveLnWwttUfoygBmvVjuikxND3znrhsELnZk7k+OjIGxeNEkomyLVta0xxn+HZhjBc4YZ/AFjHjz9u3xRZl2BN4aq9nFwWh16IrQ1aHHEd3j1+4/dB9OtH4e29A2H1DyHQRmOSfQZ1Fy7MHBTGB6J/Djq6p3OxyO2cB+4Car7v/o3GXgfAkj23+x9ID1Teoamo/SXcbvSf2PX7Vc8DdCmE1vN9di+32P9/5YR3vLnhCVGUWBjEkr3yh4H8v9CzmsbdhzOKzsJKM90iFdaTMjRPhGVsakRvOaRidljo6H6G7j+ctrJpsP+4COhDIl0La2+FS4+5mlocBaXY5QnGZysIBYoeSsl5qQzrSj/cgNrfuEzlWBfwA+EjrZyWUvpAAAAABJRU5ErkJggg==">Git - SSH免密登录<!----></h1> <!----> <div class="theme-vdoing-content content__default"><div class="custom-block note"><p class="custom-block-title">笔记</p> <p>每次我们 push 项目到远程库，都需要登录，那么有没有方法不需要登录也能 push 项目呢？需要 SSH 密钥。</p> <div class="custom-block right"><p>2022-02-08 @Du Wu</p></div></div> <p></p><div class="table-of-contents"><ul><li><a href="#步骤">步骤</a></li><li><a href="#好处">好处</a></li><li><a href="#别名">别名</a></li></ul></div><p></p> <h2 id="步骤"><a href="#步骤" class="header-anchor">#</a> 步骤</h2> <p>我们可以看到远程仓库中还有一个 SSH 的地址，因此我们也可以使用 SSH 实现免密码登录。</p> <p>进入 <code>C:/Users/用户名/.ssh</code> 目录生成公钥（没有 .ssh 目录则创建）。</p> <p>右键打开 Git Bash Here。</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>ssh-keygen <span class="token parameter variable">-t</span> rsa <span class="token parameter variable">-C</span> GitHub注册邮箱
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>执行并回车三次后会在 .ssh 目录生成两个文件：</p> <ul><li>id_rsa：私钥</li> <li>id_rsa.pub：公钥，给 GitHub，这样 GitHub 才能自动访问私钥所在的电脑，无需重新登录</li></ul> <blockquote><p>把公钥交给 GitHub</p></blockquote> <ul><li><p>复制 <code>id_rsa.pub</code> 文件内容</p></li> <li><p>前往 GitHub：点击用户头像，点击 Settings，找到 SSH and GPG keys，然后 New SSH，粘贴进去</p></li> <li><p>Gitee：点击设置，找到 SSH 公钥，粘贴进去</p></li></ul> <p>公钥可以多个平台同时设置 SSH。</p> <blockquote><p>GitHub 设置公钥图</p></blockquote> <p><img src="https://cdn.staticaly.com/gh/Kele-Bingtang/static@master/img/git/20220208165644.png" alt="image-20220208165643600"></p> <p><img src="https://cdn.staticaly.com/gh/Kele-Bingtang/static@master/img/git/20220208165654.png" alt="image-20220208165653293"></p> <p><img src="https://cdn.staticaly.com/gh/Kele-Bingtang/static@master/img/git/20220208165707.png" alt="image-20220208165706196"></p> <h2 id="好处"><a href="#好处" class="header-anchor">#</a> 好处</h2> <p>接下来再往远程仓库 push 东西的时候使用 SSH 连接就不需要登录了，因为 GitHub在国外，登录容易失败。</p> <h2 id="别名"><a href="#别名" class="header-anchor">#</a> 别名</h2> <p>对于用 https 已经克隆在本地的仓库，我们可以加个「别名」来进行 SSH 连接。</p> <p><strong>基本语法</strong></p> <p><code>git remote -v</code>：查看当前所有远程地址别名。</p> <p><code>git remote add</code>：别名 远程地址。</p> <p><strong>案例</strong></p> <p>我们提交到远程仓库的指令是：</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">git</span> push 远程仓库地址 分支
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>这个地址可以是 HTTPS 也可以是 SSH。</p> <p>但由于地址太长了，可以用「别名」代替地址。</p> <p>添加别名：</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">git</span> remote <span class="token function">add</span> kele git@github.com:Kele-Bingtang/Kele-Bingtang.github.io.git
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>推送到远程仓库：</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">git</span> push kele master
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>我们 clone 项目会做如下操作：</p> <ul><li>拉取代码</li> <li>初始化本地仓库</li> <li>创建别名，默认是 <code>origin</code></li></ul></div></div> <!----> <div class="page-edit"><!----> <div class="tags"><a href="/tags/?tag=Git" title="标签">#Git</a></div> <div class="last-updated"><span class="prefix">更新时间:</span> <span class="time">2023/04/25, 01:26:04</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/git/basic-principles/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">Git - 基本原理</div></a> <a href="/git/idea/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">Git - IDEA集成</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
